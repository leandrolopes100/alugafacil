<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Página não encontrada · Aluga Fácil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%23d97706'/><stop offset='1' stop-color='%2392400e'/></linearGradient></defs><rect width='32' height='32' rx='7' fill='url(%23g)'/><text x='16' y='23' font-family='system-ui,-apple-system,sans-serif' font-size='15' font-weight='800' fill='white' text-anchor='middle'>AF</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    /* Glows de fundo */
    body::before {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(217,119,6,.18) 0%, transparent 65%);
      top: -160px; left: -160px;
      border-radius: 50%;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(217,119,6,.1) 0%, transparent 65%);
      bottom: -120px; right: -120px;
      border-radius: 50%;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px;
      padding: 56px 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(12px);
    }

    /* Logo */
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 40px;
      text-decoration: none;
    }
    .logo-mark {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, #d97706, #6b4f08);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 800; color: #fff;
      letter-spacing: -.04em;
      flex-shrink: 0;
    }
    .logo-name {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -.02em;
    }

    /* Código de erro */
    .error-code {
      font-size: 96px;
      font-weight: 800;
      letter-spacing: -.06em;
      line-height: 1;
      background: linear-gradient(135deg, #d97706 0%, #b8860a 50%, #e0c27a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
      user-select: none;
    }

    .error-title {
      font-size: 20px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -.02em;
      margin-bottom: 10px;
    }

    .error-desc {
      font-size: 14px;
      color: rgba(255,255,255,.45);
      line-height: 1.7;
      margin-bottom: 36px;
    }

    /* Ações */
    .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 20px;
      border-radius: 9px;
      font-size: 13.5px;
      font-weight: 600;
      font-family: inherit;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: all .15s ease;
      white-space: nowrap;
    }
    .btn-primary {
      background: #d97706;
      color: #fff;
      box-shadow: 0 0 0 0 rgba(217,119,6,0);
    }
    .btn-primary:hover {
      background: #b45309;
      box-shadow: 0 4px 16px rgba(217,119,6,.4);
      transform: translateY(-1px);
    }
    .btn-ghost {
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.65);
      border: 1px solid rgba(255,255,255,.1);
    }
    .btn-ghost:hover {
      background: rgba(255,255,255,.1);
      color: #fff;
    }

    .footer-note {
      margin-top: 40px;
      font-size: 12px;
      color: rgba(255,255,255,.2);
    }

    @media (max-width: 480px) {
      .card { padding: 40px 28px; }
      .error-code { font-size: 72px; }
      .actions { flex-direction: column; }
      .btn { justify-content: center; }
    }
  </style>
</head>
<body>

<div class="card">
  <a href="/" class="logo">
    <div class="logo-mark">AF</div>
    <span class="logo-name">Aluga Fácil</span>
  </a>

  <div class="error-code">404</div>

  <div class="error-title">Página não encontrada</div>
  <p class="error-desc">
    O endereço que você acessou não existe ou foi movido.<br>
    Verifique o link ou volte ao início do sistema.
  </p>

  <div class="actions">
    <a href="/" class="btn btn-primary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Ir para o início
    </a>
    <a href="javascript:history.back()" class="btn btn-ghost">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Voltar
    </a>
  </div>

  <div class="footer-note">Aluga Fácil &copy; {% now "Y" %} — Sistema de Gestão para Locadoras</div>
</div>

</body>
</html>
