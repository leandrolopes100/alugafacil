<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Aluga Fácil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #0c1a2c;
      background-image:
        repeating-linear-gradient(120deg, transparent 0 46px, rgba(255,255,255,.028) 46px 48px);
      position: relative;
    }

    /* Faixa de identidade no topo — referência ao asfalto/estrada, sem ícone */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #d97706 20%, #d97706 80%, transparent);
    }

    .login-card {
      width: 100%;
      max-width: 380px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 24px 60px rgba(0,0,0,.35);
      padding: 40px 36px 32px;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-brand-name {
      font-size: 22px;
      font-weight: 800;
      color: #0f172a;
      letter-spacing: -.02em;
    }
    .login-brand-name .accent { color: #d97706; }
    .login-brand-tag {
      font-size: 11.5px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-top: 2px;
    }

    .login-title {
      font-size: 16px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -.01em;
      margin-bottom: 20px;
      text-align: center;
    }

    .field-label {
      display: block;
      font-size: 12.5px;
      font-weight: 600;
      color: #475569;
      margin-bottom: 6px;
    }
    .field-input-wrap { position: relative; }
    .field-input-wrap i {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 15px;
      pointer-events: none;
    }
    .field-input {
      width: 100%;
      padding: 9px 12px 9px 38px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: #0f172a;
      background: #fff;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }
    .field-input::placeholder { color: #94a3b8; }
    .field-input:focus {
      border-color: #d97706;
      box-shadow: 0 0 0 3px rgba(217,119,6,.15);
    }

    .error-msg {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fceceb;
      border: 1px solid #d9a19d;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #6b1712;
      margin-bottom: 20px;
    }

    .btn-login {
      width: 100%;
      padding: 10px;
      background: #d97706;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14.5px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s, box-shadow .15s;
      margin-top: 24px;
    }
    .btn-login:hover {
      background: #b45309;
      box-shadow: 0 4px 12px rgba(217,119,6,.35);
    }
    .btn-login:active { background: #92400e; }

    .form-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 11.5px;
      color: #94a3b8;
    }

    @media (max-width: 420px) {
      .login-card { padding: 32px 24px 26px; }
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="login-brand">
    <div class="login-brand-name">Aluga <span class="accent">Fácil</span></div>
    <div class="login-brand-tag">Sistema de Locação</div>
  </div>

  <div class="login-title">Acesse sua conta</div>

  {% if form.errors %}
  <div class="error-msg">
    <i class="bi bi-exclamation-circle-fill"></i>
    Usuário ou senha inválidos.
  </div>
  {% endif %}

  <form method="post" autocomplete="on">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ next }}">

    <div style="margin-bottom:16px">
      <label for="id_username" class="field-label">Usuário</label>
      <div class="field-input-wrap">
        <i class="bi bi-person"></i>
        <input type="text" name="username" id="id_username"
               class="field-input" placeholder="seu.usuario"
               required autofocus autocomplete="username">
      </div>
    </div>

    <div>
      <label for="id_password" class="field-label">Senha</label>
      <div class="field-input-wrap">
        <i class="bi bi-lock"></i>
        <input type="password" name="password" id="id_password"
               class="field-input" placeholder="••••••••"
               required autocomplete="current-password">
      </div>
    </div>

    <button type="submit" class="btn-login">
      Entrar no sistema
    </button>
  </form>

  <div class="form-footer">
    Aluga Fácil &copy; {% now "Y" %} — Leandro Lopes | Sistemas 
  </div>
</div>

</body>
</html>
